<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toss</title>
</head>
<body>
    <p>HEADS OR TAILS</p>
    <button class="btn1" onclick="Game('HEADS')">HEADS</button>
    <button class="btn2" onclick="Game('TAILS')">TAILS</button>
    <p id="result"></p>
    <script>
    function Game(UserChoice){
        let choice;
        const rand = Math.random();

        if (rand < 0.5){
            choice = 'HEADS';
        } else {
            choice = 'TAILS';
        }

        let result;

        if (UserChoice === choice) {
            result = "WIN";
        } else {
            result = "LOSE";
        }

        document.getElementById("result").innerHTML =
        `You chose: ${UserChoice}<br>Coin: ${choice}<br>Result: ${result}`;
    }
    </script>
</body>
</html>
