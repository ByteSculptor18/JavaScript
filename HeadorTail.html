<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toss</title>
    <style>
        .st1{
            border: none;
            background-color: black;
            color: white;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-right: 15px;
            padding-left: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-right: 5px;
        }
        .st2{
            border: none;
            background-color: black;
            color: white;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-right: 15px;
            padding-left: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>HEADS OR TAILS</h1>
    <button class="btn1 st1" onclick="Game('HEADS')">HEADS</button>
    <button class="btn2 st2" onclick="Game('TAILS')">TAILS</button>
    <p id="result"></p>
    <script>
    function Game(UserChoice){
        let choice;
        const rand = Math.random();

        if (rand < 0.5){
            choice = 'HEADS';
        } else {
            choice = 'TAILS';
        }

        let result;

        if (UserChoice === choice) {
            result = "WIN";
        } else {
            result = "LOSE";
        }

        document.getElementById("result").innerHTML =
        `You chose: ${UserChoice}<br>Coin: ${choice}<br>Result: ${result}`;
    }
    </script>
</body>
</html>
