<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Shipping Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .Calculate {
            padding: 10px;
            font-size: 15px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }
        .bt1 {
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 3px;
            border: none;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
    </style> 
</head>
<body>

    <h1>Amazon Shipping Calculator</h1>

    <p>Orders under $500 → Shipping: $5</p>
    <p>Orders $500 or more → Free Shipping</p>

    <input type="number" id="orderAmount" class="Calculate" placeholder="Enter order amount" onkeydown="
    console.log(Type(event.key));">
    <button onclick="calculate()" class="bt1">Calculate</button>

    <p id="shippingCost"></p>
    <p id="totalCost"></p>

    <script>
        function getShipping(orderAmount) {
            return orderAmount < 500 ? 5 : 0;
        }

        function calculate() {
            const orderAmount = parseFloat(document.querySelector('#orderAmount').value);

            if (!(orderAmount) || orderAmount < 0) {
                document.querySelector('#shippingCost').innerText = "Enter a valid amount.";
                document.querySelector('#totalCost').innerText = "";
                return;
            }

            const shipping = getShipping(orderAmount);
            const total = orderAmount + shipping;

            document.querySelector('#shippingCost').innerText =
                `Shipping Cost: $${shipping}`;

            document.querySelector('#totalCost').innerText =
                `Total Cost: $${total}`;
        }
        function Type(value) {
            if (value >= '0' && value <= '9') {
                return "Number";
            } else if (value === '.' || value === '-') {
                return "Decimal or Negative Sign";
            } else if (value === 'Backspace' || value === 'Delete' || value === 'ArrowLeft' || value === 'ArrowRight') {
                return "Editing Key";
            } else if (value === 'Enter') {
                calculate();
                return "Enter Key";
            } else {
                return "Invalid Key";
            }
        }
    </script>

</body>
</html>
