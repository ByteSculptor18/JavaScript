<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<body>
    <h1>Rock Paper Scissor Game</h1>
    <button onclick="Game('rock')">Rock</button>
    <button onclick="Game('paper')">Paper</button>
    <button onclick="Game('scissor')">Scissor</button>
    <script>
        function Game(userChoice) {
            let choice;
            const random = Math.random();
            if (random < 1/3) {
                choice = 'rock';
            } else if (random < 2/3) {
                choice = 'paper';
            } else {
                choice = 'scissor';
            }
            let result;
            if (userChoice === choice) {
                result = "It's a tie!";
            } 
            else if (
                (userChoice === 'rock' && choice === 'scissor') ||
                (userChoice === 'paper' && choice === 'rock') ||
                (userChoice === 'scissor' && choice === 'paper')
            ) {
                result = "You win!";
            } 
            else {
                result = "Computer wins!";
            }
            alert(
                `You chose: ${userChoice}! \n` + `Computer chose: ${choice}! \n` + `${result}`
            );
        }
    </script>
</body>
</html>
