<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Boolean Exercise</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <script>
        /*
            Rock > Scissors
            Scissors > Paper
            Paper > Rock
        */
            <h2>Rock Paper Scissors</h2>
            <button onclick="
                const Rock = Math.random();
                if (Rock >= 0 && Rock < 1/3)
                {
                    console.log('Computer chose Rock');
                    console.log('It is a tie!');
                }
                else if (Rock >= 1/3 && Rock < 2/3)
                {
                    console.log('Computer chose Paper');
                    console.log('Computer wins!');
                }
                else
                {
                    console.log('Computer chose Scissors');
                    console.log('You win!');
                }
            ">Rock</button>
            <button onclick="
                const Paper = Math.random();
                if (Paper >= 0 && Paper < 1/3)
                {
                    console.log('Computer chose Rock');
                    console.log('Computer wins!');

                }
                else if (Paper >= 1/3 && Paper < 2/3)
                {
                    console.log('Computer chose Paper');
                    console.log('It is a tie!');
                }
                else
                {
                    console.log('Computer chose Scissors');
                    console.log('You win!');
                }
            ">Paper</button>
            <button onclick="
                const Scissors = Math.random();
                if (Scissors >= 0 && Scissors < 1/3)
                {
                    console.log('Computer chose Rock');
                    console.log('You win!');
                }
                else if (Scissors >= 1/3 && Scissors < 2/3)
                {
                    console.log('Computer chose Paper');
                    console.log('Computer wins!');
                }
                else
                {
                    console.log('Computer chose Scissors');
                    console.log('It is a tie!');
                }
            ">Scissors</button>
        </script>
    </body>
