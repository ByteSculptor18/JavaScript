<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<body>
    <h1>Rock Paper Scissor Game</h1>
    <button onclick="Game('Rock')">Rock</button>
    <button onclick="Game('Paper')">Paper</button>
    <button onclick="Game('Scissor')">Scissor</button>
    <button onclick="resetScore()">Reset Score</button>
    <script>
        let score = JSON.parse(localStorage.getItem('score')) || { // Object and Used Local Storage to save score
                user: 0,
                computer: 0,
                ties: 0
            };
        function Game(userChoice) { // Function to play the game
            let choice;
            const random = Math.random();
            if (random < 1/3) {
                choice = 'Rock';
            } else if (random < 2/3) {
                choice = 'Paper';
            } else {
                choice = 'Scissor';
            }
            let result;
            if (userChoice === choice) {
                result = "It's a tie!";
                score.ties++;
            } 
            else if (
                (userChoice === 'Rock' && choice === 'Scissor') ||
                (userChoice === 'Paper' && choice === 'Rock') ||
                (userChoice === 'Scissor' && choice === 'Paper')
            ) {
                result = "You win!";
                score.user++;
            } 
            else {
                result = "Computer wins!";
                score.computer++;
            }
            localStorage.setItem('score', JSON.stringify(score)); // Save score to local storage
            alert(
                `You chose: ${userChoice}! \n` + `Computer chose: ${choice}! \n` + `${result}\n` + `Score - You: ${score.user}, Computer: ${score.computer}, Ties: ${score.ties}`
            );
        }
        function resetScore() {
            score.user = 0;
            score.computer = 0;
            score.ties = 0;
            alert("Score has been reset!");
        }
    </script>
</body>
</html>
